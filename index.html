<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>راديو القرآن الكريم</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', sans-serif; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-4">
  <div class="text-center text-2xl md:text-3xl font-extrabold text-green-400 mb-4 tracking-wide">
    تصميم مصطفى حليمو
  </div>
  <h1 class="text-3xl md:text-5xl font-bold mb-6">راديو القرآن الكريم</h1>

  <div class="w-full max-w-md bg-gray-800 p-4 rounded-2xl shadow-lg">
    <label for="reciter" class="block mb-2 text-lg">اختر القارئ:</label>
    <select id="reciter" class="w-full p-2 rounded bg-gray-700 text-white mb-4">
      <option value="https://stream.radiojar.com/qs8b3qz0tzwtv">إذاعة السعودية</option>
      <option value="https://stream.radiojar.com/8s5u5tpdtwzuv">مشاري راشد</option>
      <option value="https://stream.radiojar.com/xhrpdtpdtwzuv">عبدالباسط عبدالصمد</option>
    </select>

    <audio id="audioPlayer" class="w-full" controls autoplay>
      <source src="https://stream.radiojar.com/qs8b3qz0tzwtv" type="audio/mpeg">
      متصفحك لا يدعم تشغيل الراديو.
    </audio>
  </div>

  <div class="mt-8">
    <p id="prayer-times" class="text-center text-sm text-gray-300">تحميل أوقات الصلاة...</p>
  </div>

  <script>
    const audio = document.getElementById('audioPlayer');
    const reciter = document.getElementById('reciter');

    reciter.addEventListener('change', () => {
      audio.src = reciter.value;
      audio.play();
    });

    // جلب أوقات الصلاة حسب الموقع
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(pos => {
        const { latitude, longitude } = pos.coords;
        fetch(`https://api.aladhan.com/v1/timings?latitude=${latitude}&longitude=${longitude}&method=2`)
          .then(res => res.json())
          .then(data => {
            const times = data.data.timings;
            document.getElementById('prayer-times').innerHTML =
              `الفجر: ${times.Fajr} | الظهر: ${times.Dhuhr} | العصر: ${times.Asr} | المغرب: ${times.Maghrib} | العشاء: ${times.Isha}`;
          });
      });
    }
  </script>
</body>
</html>
